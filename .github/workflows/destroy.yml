name: destroy alex stacks

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type destroy-alex to confirm (destroys stacks 8_enterprise → 2_sagemaker; keeps 0_bootstrap)"
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    name: destroy alex workload stacks
    runs-on: ubuntu-latest
    env:
      DEFAULT_AWS_REGION: ${{ secrets.DEFAULT_AWS_REGION }}
      AWS_REGION: ${{ secrets.DEFAULT_AWS_REGION }}
    steps:
      - name: Check confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "destroy-alex" ]; then
            echo "Input must be exactly: destroy-alex"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: alex-github-actions-destroy
          aws-region: ${{ secrets.DEFAULT_AWS_REGION }}

      - name: Terraform state bucket from AWS account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "TF_STATE_BUCKET=alex-terraform-state-${ACCOUNT_ID}" >> "$GITHUB_ENV"
          echo "TF_VAR_remote_state_bucket=alex-terraform-state-${ACCOUNT_ID}" >> "$GITHUB_ENV"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Destroy all workload stacks (8 → 2)
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_clerk_jwks_url: ${{ secrets.TF_VAR_clerk_jwks_url || 'https://example.com/.well-known/jwks.json' }}
          TF_VAR_clerk_issuer: ${{ secrets.TF_VAR_clerk_issuer || 'https://example.com' }}
          TF_VAR_openai_api_key: ${{ secrets.TF_VAR_openai_api_key || secrets.OPENAI_API_KEY || 'dummy-openai-key-destroy' }}
          TF_VAR_alex_api_endpoint: ${{ secrets.TF_VAR_alex_api_endpoint || 'https://dummy.invalid/ingest' }}
          TF_VAR_alex_api_key: ${{ secrets.TF_VAR_alex_api_key || 'dummy-api-key-destroy' }}
          TF_VAR_aurora_cluster_arn: ${{ secrets.TF_VAR_aurora_cluster_arn || 'arn:aws:rds:us-east-1:000000000000:cluster:dummy-destroy' }}
          TF_VAR_aurora_secret_arn: ${{ secrets.TF_VAR_aurora_secret_arn || 'arn:aws:secretsmanager:us-east-1:000000000000:secret:dummy-destroy' }}
          TF_VAR_vector_bucket: ${{ secrets.TF_VAR_vector_bucket || 'dummy-vector-bucket-destroy' }}
          TF_VAR_polygon_api_key: ${{ secrets.TF_VAR_polygon_api_key || 'dummy-polygon-destroy' }}
          TF_VAR_bedrock_model_id: ${{ secrets.TF_VAR_bedrock_model_id || 'amazon.nova-lite-v1:0' }}
          TF_VAR_bedrock_region: ${{ secrets.TF_VAR_bedrock_region || env.AWS_REGION }}
          TF_VAR_sagemaker_endpoint: ${{ secrets.TF_VAR_sagemaker_endpoint || 'alex-embedding-endpoint' }}
          TF_VAR_sagemaker_endpoint_name: ${{ secrets.TF_VAR_sagemaker_endpoint_name || 'alex-embedding-endpoint' }}
        run: python3 scripts/destroy.py --yes
