name: destroy alex

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type destroy-part7 to confirm"
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    name: destroy alex
    runs-on: ubuntu-latest
    env:
      DEFAULT_AWS_REGION: ${{ secrets.DEFAULT_AWS_REGION }}
      AWS_REGION: ${{ secrets.DEFAULT_AWS_REGION }}
    steps:
      - name: Check confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "destroy-part7" ]; then
            echo "Input must be exactly: destroy-part7"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: alex-github-actions-destroy
          aws-region: ${{ secrets.DEFAULT_AWS_REGION }}

      - name: Terraform state bucket from AWS account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "TF_STATE_BUCKET=alex-terraform-state-${ACCOUNT_ID}" >> "$GITHUB_ENV"
          echo "TF_VAR_remote_state_bucket=alex-terraform-state-${ACCOUNT_ID}" >> "$GITHUB_ENV"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Destroy
        env:
          TF_VAR_clerk_jwks_url: ${{ secrets.TF_VAR_clerk_jwks_url }}
          TF_VAR_clerk_issuer: ${{ secrets.TF_VAR_clerk_issuer }}
        run: python3 scripts/destroy.py --yes
