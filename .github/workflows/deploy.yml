name: deploy alex

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: deploy alex
    runs-on: ubuntu-latest
    env:
      DEFAULT_AWS_REGION: ${{ secrets.DEFAULT_AWS_REGION }}
      AWS_REGION: ${{ secrets.DEFAULT_AWS_REGION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: alex-github-actions-deploy
          aws-region: ${{ secrets.DEFAULT_AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      # Bucket name must match terraform/0_bootstrap and the OIDC role's account (not a separate secret).
      - name: Terraform state bucket from AWS account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "Terraform state bucket: alex-terraform-state-${ACCOUNT_ID}"
          echo "TF_STATE_BUCKET=alex-terraform-state-${ACCOUNT_ID}" >> "$GITHUB_ENV"
          echo "TF_VAR_remote_state_bucket=alex-terraform-state-${ACCOUNT_ID}" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Add uv to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Production env for Next.js (Clerk)
        working-directory: frontend
        env:
          PK: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
        run: |
          test -n "$PK" || (echo "Missing secret NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY" && exit 1)
          echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=$PK" > .env.production

      - name: Run deploy
        env:
          GITHUB_ACTIONS: "true"
          TF_VAR_clerk_jwks_url: ${{ secrets.TF_VAR_clerk_jwks_url }}
          TF_VAR_clerk_issuer: ${{ secrets.TF_VAR_clerk_issuer }}
        run: |
          test -n "${{ secrets.TF_VAR_clerk_jwks_url }}" || (echo "Set TF_VAR_clerk_jwks_url" && exit 1)
          test -n "${{ secrets.TF_VAR_clerk_issuer }}" || (echo "Set TF_VAR_clerk_issuer" && exit 1)
          python3 scripts/deploy.py

      # URLs are printed by scripts/deploy.py; avoid a second `terraform output` here (needs same TF_VAR / backend as deploy).
